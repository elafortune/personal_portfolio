  <!-- Orders dots -->
  <circle cx="80"  cy="193" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="140" cy="175" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="200" cy="185" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="260" cy="162" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="320" cy="151" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="380" cy="146" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="440" cy="157" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="500" cy="136" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="560" cy="123" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="620" cy="115" r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="680" cy="97"  r="3" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="740" cy="76"  r="4" fill="#06b6d4" stroke="#67e8f9" stroke-width="1.5"/>

  <!-- Tooltip-like annotation for last point -->
  <rect x="696" y="34" width="90" height="22" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  <text x="741" y="49" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="11" font-weight="600">+178% CA</text>

  <!-- Legend -->
  <rect x="165" y="345" width="470" height="34" rx="6" fill="#1e293b" opacity="0.8"/>
  <line x1="185" y1="362" x2="215" y2="362" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="200" cy="362" r="3.5" fill="#3b82f6"/>
  <text x="222" y="367" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Chiffre d'affaires (€)</text>
  <line x1="375" y1="362" x2="405" y2="362" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="390" cy="362" r="3" fill="#06b6d4"/>
  <text x="412" y="367" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Commandes passées</text>
</svg>
