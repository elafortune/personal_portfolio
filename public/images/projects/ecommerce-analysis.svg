<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="ordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600" letter-spacing="0.5">Analyse Comportements d'Achats — E-commerce</text>

  <!-- Horizontal grid lines -->
  <line x1="80" y1="50"  x2="750" y2="50"  stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="115" x2="750" y2="115" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="180" x2="750" y2="180" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="245" x2="750" y2="245" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="310" x2="750" y2="310" stroke="#334155" stroke-width="1"/>

  <!-- Vertical dashes -->
  <line x1="200" y1="50" x2="200" y2="310" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="320" y1="50" x2="320" y2="310" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="440" y1="50" x2="440" y2="310" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="560" y1="50" x2="560" y2="310" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="680" y1="50" x2="680" y2="310" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Y-axis -->
  <line x1="80" y1="46" x2="80" y2="314" stroke="#334155" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="77" y1="310" x2="754" y2="310" stroke="#334155" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="70" y="54"  text-anchor="end" fill="#475569" font-family="system-ui,sans-serif" font-size="11">100k</text>
  <text x="70" y="119" text-anchor="end" fill="#475569" font-family="system-ui,sans-serif" font-size="11">75k</text>
  <text x="70" y="184" text-anchor="end" fill="#475569" font-family="system-ui,sans-serif" font-size="11">50k</text>
  <text x="70" y="249" text-anchor="end" fill="#475569" font-family="system-ui,sans-serif" font-size="11">25k</text>
  <text x="70" y="314" text-anchor="end" fill="#475569" font-family="system-ui,sans-serif" font-size="11">0</text>
  <text x="18" y="185" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10" transform="rotate(-90,18,185)">Chiffre d'affaires (€)</text>

  <!-- X-axis labels -->
  <text x="80"  y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Jan</text>
  <text x="140" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Fév</text>
  <text x="200" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Mar</text>
  <text x="260" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Avr</text>
  <text x="320" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Mai</text>
  <text x="380" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Jun</text>
  <text x="440" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Jul</text>
  <text x="500" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Aoû</text>
  <text x="560" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Sep</text>
  <text x="620" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Oct</text>
  <text x="680" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Nov</text>
  <text x="740" y="328" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Déc</text>

  <!-- Revenue area fill -->
  <path d="M 80,242 L 140,216 L 200,227 L 260,190 L 320,172 L 380,162 L 440,180 L 500,141 L 560,118 L 620,107 L 680,79 L 740,50 L 740,310 L 80,310 Z" fill="url(#revGrad)"/>

  <!-- Revenue line -->
  <polyline points="80,242 140,216 200,227 260,190 320,172 380,162 440,180 500,141 560,118 620,107 680,79 740,50"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Revenue dots -->
  <circle cx="80"  cy="242" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="140" cy="216" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="200" cy="227" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="260" cy="190" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="320" cy="172" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="380" cy="162" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="440" cy="180" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="500" cy="141" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="560" cy="118" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="620" cy="107" r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="680" cy="79"  r="3.5" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="740" cy="50"  r="5"   fill="#3b82f6" stroke="#93c5fd" stroke-width="2"/>

  <!-- Orders area fill -->
  <path d="M 80,193 L 140,175 L 200,185 L 260,162 L 320,151 L 380,146 L 440,157 L 500,136 L 560,123 L 620,115 L 680,97 L 740,76 L 740,310 L 80,310 Z" fill="url(#ordGrad)"/>

  <!-- Orders line -->
  <polyline points="80,193 140,175 200,185 260,162 320,151 380,146 440,157 500,136 560,123 620,115 680,97 740,76"
